<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StoryTime</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- This is the root element Vue.js will take over and run the app inside -->
  <div id="app">
    <header class="app-header">
      <h1>📖 StoryTime</h1>
      <p class="tagline">Bedtime stories for Kai &amp; Nozomi</p>
    </header>

    <main class="app-main">
      <p>App coming soon...</p>
    </main>
  </div>

  <!-- Vue.js loaded from CDN (Content Delivery Network) -->
  <!-- A CDN means we don't need to install anything — the browser fetches Vue directly from the internet -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

  <!-- Our app logic -->
  <script src="js/app.js"></script>

</body>
</html>
