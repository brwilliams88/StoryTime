<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StoryTime</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div id="app">

    <!-- ============== SPLASH ============== -->
    <div v-if="showSplash" class="splash" @click="dismissSplash">
      <div class="splash-content">
        <div class="splash-emoji">📖</div>
        <h1 class="splash-title">StoryTime</h1>
      </div>
    </div>

    <!-- ============== PASSWORD ============== -->
    <div v-else-if="showPasswordPrompt" class="modal-overlay">
      <div class="modal">
        <h2>Welcome</h2>
        <p class="modal-text">Enter the app password to begin.</p>
        <input
          type="password"
          v-model="passwordInput"
          @keyup.enter="submitPassword"
          placeholder="Password"
          class="text-input"
          autofocus
        />
        <button @click="submitPassword" class="btn-primary">Enter</button>
        <p v-if="error" class="error-text">{{ error }}</p>
      </div>
    </div>

    <!-- ============== MAIN APP ============== -->
    <template v-else>

      <header class="app-header">
        <h1 @click="handleNewStory">📖 StoryTime</h1>
        <p class="tagline">Bedtime stories for Kai &amp; Nozomi</p>
      </header>

      <main class="app-main">

        <!-- ============== LOADING ============== -->
        <div v-if="loading" class="loading-screen">
          <div class="loading-spinner"></div>
          <p class="loading-text">{{ loadingMessage }}</p>
          <p class="loading-hint">This takes about {{ loadingHint }}.</p>
        </div>

        <!-- ============== FORM ============== -->
        <div v-else-if="view === 'create'" class="create-form">

          <div class="form-top-bar">
            <h2 class="section-title">Create a New Story</h2>
            <div class="form-top-actions">
              <button v-if="currentStory" @click="backToStory" class="btn-secondary btn-small">← Back to Story</button>
              <button @click="handleResetForm" class="btn-secondary btn-small">Reset Form</button>
            </div>
          </div>

          <!-- 1. Characters -->
          <div class="form-field">
            <label>Characters <span class="optional">(optional)</span></label>
            <div class="character-chips">
              <div
                v-for="c in selectedCharacters"
                :key="c.id"
                class="char-chip"
              >
                <span class="char-chip-name">{{ c.name }}</span>
                <span v-if="getCharacterRole(c.id) !== 'none'" class="char-chip-role">
                  {{ roleLabel(getCharacterRole(c.id)) }}
                </span>
                <button class="char-chip-remove" @click="toggleCharacterSelected(c.id)" title="Remove">✕</button>
              </div>
              <button @click="openCharactersModal" class="btn-secondary btn-small">
                👥 Choose Characters
              </button>
            </div>
          </div>

          <!-- 2. Story Details -->
          <div class="form-field">
            <label>Story Details <span class="help-text">— make it your own with cool details</span> <span class="optional">(optional)</span></label>
            <textarea
              v-model="formData.storyDetails"
              placeholder="Anything that makes this story special — setting, plot, surprises, who's in it... e.g. 'A rainy day in Hawaii, the kids find a magic conch, mention pancakes for breakfast'"
              class="textarea-input"
              rows="3"
            ></textarea>
          </div>

          <!-- 3. Age -->
          <div class="form-field">
            <label>Story for age</label>
            <div class="pill-group age-pills">
              <button
                v-for="n in 10"
                :key="n"
                @click="formData.age = n"
                :class="['pill pill-num', { active: formData.age === n }]"
              >{{ n }}</button>
            </div>
          </div>

          <!-- 4. Length -->
          <div class="form-field">
            <label>Story Length</label>
            <div class="pill-group">
              <button
                v-for="option in lengths"
                :key="option.value"
                @click="formData.length = option.value"
                :class="['pill', { active: formData.length === option.value }]"
              >
                <div class="pill-label">{{ option.label }}</div>
                <div class="pill-subtitle">{{ option.subtitle }}</div>
              </button>
            </div>
          </div>

          <!-- 5. Genre -->
          <div class="form-field">
            <label>Genre <span class="help-text">— the type of story</span></label>
            <div class="pill-group wrap">
              <button
                v-for="g in genres"
                :key="g.value"
                @click="formData.genre = g.value"
                :class="['pill pill-compact', { active: formData.genre === g.value }]"
              >
                <span class="pill-emoji">{{ g.emoji }}</span>
                <span class="pill-text">{{ g.label }}</span>
              </button>
            </div>
          </div>

          <!-- 6. Story Ingredients -->
          <div class="form-field">
            <label>
              Story Ingredients <span class="help-text">— how it should feel</span>
              <span class="optional">(pick up to 3 — {{ ingredientCount }}/3 selected)</span>
            </label>
            <div class="pill-group wrap">
              <button
                v-for="ing in ingredients"
                :key="ing.value"
                @click="toggleIngredient(ing.value)"
                :disabled="isIngredientDisabled(ing.value)"
                :class="['pill pill-compact', { active: isIngredientActive(ing.value), disabled: isIngredientDisabled(ing.value) }]"
              >
                <span class="pill-emoji">{{ ing.emoji }}</span>
                <span class="pill-text">{{ ing.label }}</span>
              </button>
            </div>
          </div>

          <!-- 7. Theme -->
          <div class="form-field">
            <label>Theme <span class="help-text">— the moral or message</span> <span class="optional">(optional)</span></label>
            <div class="pill-group wrap theme-presets">
              <button
                v-for="t in themes"
                :key="t"
                @click="selectThemePreset(t)"
                :class="['pill pill-small', { active: formData.theme === t }]"
              >{{ t }}</button>
            </div>
            <input
              type="text"
              v-model="formData.theme"
              placeholder="Or type your own — e.g. 'the moral of the story is to keep trying'"
              class="text-input theme-input"
            />
          </div>

          <button @click="handleGenerate" class="btn-primary btn-large">Generate Story</button>

          <p v-if="error" class="error-text">{{ error }}</p>

        </div>

        <!-- ============== STORY DISPLAY ============== -->
        <div v-else-if="view === 'story' && currentStory" class="story-view">

          <div class="story-top-bar">
            <button @click="editSettings" class="btn-secondary btn-small">← Edit Settings</button>
          </div>

          <h2 class="story-title">{{ currentStory.title }}</h2>

          <div class="story-pages">
            <div v-for="page in currentStory.pages" :key="page.page_number" class="story-page">
              <div class="page-number">Page {{ page.page_number }}</div>
              <p class="page-text">{{ page.text }}</p>
            </div>
          </div>

          <div class="cost-display">
            <div class="cost-amount">This story cost {{ formattedCost }}</div>
            <div class="coin-row">
              <template v-for="(group, idx) in coinBreakdown" :key="idx">
                <span
                  v-for="n in group.count"
                  :key="group.type + '-' + n"
                  :class="['coin', 'coin-' + group.type]"
                  :style="group.partial < 1 ? { clipPath: 'inset(0 ' + ((1 - group.partial) * 100) + '% 0 0)' } : {}"
                >
                  <img :src="'assets/images/coin-' + group.type + '.png'" :alt="group.type" />
                </span>
              </template>
            </div>
          </div>

          <div class="story-actions">
            <button @click="handleRegenerate" class="btn-secondary">Regenerate</button>
            <button @click="handleContinueStory" class="btn-secondary" title="Coming soon — will let you write a Part 2 with the same characters" disabled>Continue Story</button>
            <button @click="handleNewStory" class="btn-primary">New Story</button>
          </div>
        </div>

      </main>

      <!-- ============== CHARACTERS MODAL ============== -->
      <div v-if="showCharactersModal" class="modal-overlay" @click.self="closeCharactersModal">
        <div class="modal modal-wide">

          <!-- ===== List Mode ===== -->
          <template v-if="charModalMode === 'list'">
            <div class="modal-header">
              <h2>Manage Characters</h2>
              <button @click="closeCharactersModal" class="modal-close">✕</button>
            </div>

            <div class="modal-actions">
              <button @click="startCreateCharacter" class="btn-primary btn-small">+ Create New</button>
              <button @click="handleGenerateRandom" :disabled="generatingRandom" class="btn-secondary btn-small">
                🎲 {{ generatingRandom ? 'Generating…' : 'Generate Random' }}
              </button>
            </div>

            <div v-if="error" class="error-text" style="margin: 0.5rem 0;">{{ error }}</div>

            <div class="char-list">
              <div v-if="characters.length === 0" class="char-list-empty">
                No saved characters yet. Tap "Create New" or "Generate Random" to add one.
              </div>
              <div
                v-for="c in sortedCharacters"
                :key="c.id"
                :class="['char-row', { selected: isCharacterSelected(c.id) }]"
              >
                <div class="char-row-main" @click="toggleCharacterSelected(c.id)">
                  <div class="char-row-check">
                    {{ isCharacterSelected(c.id) ? '✓' : '○' }}
                  </div>
                  <div class="char-row-info">
                    <div class="char-row-name">{{ c.name }}</div>
                    <div class="char-row-meta">{{ formatRelative(c.last_used_at) }}</div>
                  </div>
                </div>

                <!-- Role pills (only if selected) -->
                <div v-if="isCharacterSelected(c.id)" class="char-role-pills">
                  <button
                    :class="['pill pill-small', { active: getCharacterRole(c.id) === 'good-guy' }]"
                    @click="setCharacterRole(c.id, getCharacterRole(c.id) === 'good-guy' ? 'none' : 'good-guy')"
                  >Good Guy</button>
                  <button
                    :class="['pill pill-small', { active: getCharacterRole(c.id) === 'bad-guy' }]"
                    @click="setCharacterRole(c.id, getCharacterRole(c.id) === 'bad-guy' ? 'none' : 'bad-guy')"
                  >Bad Guy</button>
                </div>

                <div class="char-row-actions">
                  <button @click="startEditCharacter(c)" class="btn-secondary btn-tiny">Edit</button>
                  <button @click="handleDeleteCharacter(c)" class="btn-secondary btn-tiny btn-danger">Delete</button>
                </div>
              </div>
            </div>

            <div class="modal-footer">
              <button @click="closeCharactersModal" class="btn-primary">Done</button>
            </div>
          </template>

          <!-- ===== Create / Edit Mode ===== -->
          <template v-else>
            <div class="modal-header">
              <h2>{{ charModalMode === 'create' ? 'Create Character' : 'Edit Character' }}</h2>
              <button @click="cancelCharForm" class="modal-close">✕</button>
            </div>

            <div class="char-form">

              <div class="form-field">
                <label>Name</label>
                <input
                  type="text"
                  v-model="charForm.name"
                  placeholder="e.g. Kai, Bumble, Lord Frostbeard"
                  class="text-input"
                />
              </div>

              <div class="form-field">
                <label>Description</label>
                <textarea
                  v-model="charForm.user_description"
                  placeholder="Describe them in your own words — appearance, personality, anything you want consistent. e.g. '6-year-old boy with short black hair, brave, loves dinosaurs'"
                  class="textarea-input"
                  rows="4"
                ></textarea>
              </div>

              <button
                @click="handleEnhance"
                :disabled="!charFormCanEnhance"
                class="btn-primary"
              >
                ✨ {{ enhancing ? 'Enhancing…' : 'Enhance Description' }}
              </button>

              <div v-if="charForm.visual_description" class="form-field" style="margin-top: 1.2rem;">
                <label>Enhanced description <span class="help-text">— this is what goes into stories and images</span></label>
                <textarea
                  v-model="charForm.visual_description"
                  class="textarea-input"
                  rows="6"
                ></textarea>
              </div>

              <div v-if="error" class="error-text">{{ error }}</div>

              <div class="modal-footer">
                <button @click="cancelCharForm" class="btn-secondary">Cancel</button>
                <button
                  v-if="charForm.visual_description"
                  @click="handleEnhance"
                  :disabled="enhancing"
                  class="btn-secondary"
                >🔁 Regenerate</button>
                <button
                  @click="handleSaveCharacter"
                  :disabled="!charFormCanSave"
                  class="btn-primary"
                >💾 Save</button>
              </div>
            </div>
          </template>

        </div>
      </div>

      <!-- ============== DEBUG ICON ============== -->
      <button class="debug-icon" @click="toggleDebug" title="Debug panel">🐛</button>

      <!-- ============== DEBUG PANEL ============== -->
      <aside v-if="showDebug" class="debug-panel">
        <div class="debug-header">
          <h3>Debug Panel</h3>
          <button @click="toggleDebug" class="debug-close">✕</button>
        </div>

        <div class="debug-section">
          <h4>App</h4>
          <div class="debug-stat">Version: <strong>{{ version }}</strong></div>
          <div class="debug-stat">Build date: <strong>{{ buildDate }}</strong></div>
        </div>

        <div class="debug-section">
          <h4>Storage</h4>
          <div class="debug-stat">Stories used: <strong>{{ formattedStorageSize }}</strong></div>
          <div class="debug-stat">Characters saved: <strong>{{ characters.length }}</strong></div>
          <button @click="handleClearStories" class="btn-secondary btn-small">Clear All Stories</button>
        </div>

        <div class="debug-section">
          <h4>Quick actions</h4>
          <button @click="handleFakeStory" class="btn-secondary btn-small">Generate Fake Story</button>
          <button @click="resetPassword" class="btn-secondary btn-small">Reset Password</button>
        </div>

        <div class="debug-section">
          <h4>Last generation</h4>
          <div class="debug-stat">Cost: <strong>${{ currentStoryCost.toFixed(6) }}</strong></div>
          <div class="debug-stat" v-if="lastTokens">
            Tokens: {{ lastTokens.prompt_tokens }} in + {{ lastTokens.completion_tokens }} out = {{ lastTokens.total_tokens }}
          </div>
        </div>

        <div class="debug-section" v-if="selectedCharacters.length > 0">
          <h4>Selected characters (for next story)</h4>
          <div v-for="c in selectedCharacters" :key="c.id" class="debug-character">
            <div><strong>{{ c.name }}</strong> — {{ roleLabel(getCharacterRole(c.id)) || 'no role' }}</div>
            <pre class="debug-code">{{ c.visual_description }}</pre>
          </div>
        </div>

        <div class="debug-section" v-if="lastPrompt">
          <h4>Prompt sent to GPT-4o</h4>
          <button @click="copyToClipboard(lastPrompt)" class="btn-secondary btn-tiny">Copy</button>
          <pre class="debug-code">{{ lastPrompt }}</pre>
        </div>

        <div class="debug-section" v-if="lastRawResponse">
          <h4>Raw response</h4>
          <button @click="copyToClipboard(JSON.stringify(lastRawResponse, null, 2))" class="btn-secondary btn-tiny">Copy</button>
          <pre class="debug-code">{{ JSON.stringify(lastRawResponse, null, 2) }}</pre>
        </div>
      </aside>

    </template>
  </div>

  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
