<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <title>StoryTime</title>

  <link rel="apple-touch-icon" href="assets/icons/appicon-preMVP.png" />
  <link rel="icon" type="image/png" href="assets/icons/appicon-preMVP.png" />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/cropperjs@1.5.13/dist/cropper.min.css" />
  <link rel="stylesheet" href="css/style.css?v=0.9.52" />
</head>
<body>

  <div id="app">

    <!-- ============== SPLASH ============== -->
    <div v-if="showSplash" class="splash" @click="dismissSplash">
      <div class="splash-content">
        <div class="splash-emoji">📖</div>
        <h1 class="splash-title">StoryTime</h1>
        <div class="splash-version">{{ version }}</div>
      </div>
    </div>

    <!-- ============== PASSWORD ============== -->
    <div v-else-if="showPasswordPrompt" class="modal-overlay">
      <div class="modal">
        <h2>Welcome</h2>
        <p class="modal-text">Enter the app password to begin.</p>
        <input type="password" v-model="passwordInput" @keyup.enter="submitPassword" placeholder="Password" class="text-input" autofocus />
        <button @click="submitPassword" class="btn-primary">Enter</button>
        <p v-if="error" class="error-text">{{ error }}</p>
      </div>
    </div>

    <!-- ============== MAIN APP ============== -->
    <template v-else>

      <header v-if="view === 'create'" class="app-header">
        <h1 @click="goLibrary">📖 StoryTime</h1>
        <p class="tagline">Bedtime stories for Kai &amp; Nozomi</p>
      </header>

      <main class="app-main" :class="{ 'app-main-reading': view === 'story' && currentStory }">

        <!-- ============== LOADING ============== -->
        <div v-if="loading" class="loading-screen">
          <div class="book-loader" aria-label="Loading">
            <div class="book-loader-base"></div>
            <div class="book-loader-page"></div>
            <div class="book-loader-page"></div>
            <div class="book-loader-page"></div>
            <div class="book-loader-page"></div>
            <div class="book-loader-page"></div>
          </div>
          <p class="loading-text">{{ loadingMessage }}</p>
          <p class="loading-hint">Ready to read in about {{ loadingHint }}.</p>
        </div>

        <!-- ============== FORM ============== -->
        <div v-else-if="view === 'create'" class="create-form">

          <div class="form-top-bar">
            <h2 class="section-title">Create a New Story</h2>
            <div class="form-top-actions">
              <button v-if="currentStory" @click="backToStory" class="btn-secondary btn-small">← Back to Story</button>
              <button @click="goLibrary" class="btn-secondary btn-small">← Library</button>
              <button @click="handleResetForm" class="btn-secondary btn-small">Reset Form</button>
              <button @click="openSettings" class="btn-secondary btn-small gear-btn" title="Settings">⚙️</button>
            </div>
          </div>

          <div class="form-field">
            <label>Characters <span class="optional">({{ selectedCharCount }}/5 selected)</span></label>
            <div class="character-chips">
              <div v-for="c in selectedCharacters" :key="c.id" class="char-chip">
                <span class="char-chip-name">{{ c.name }}</span>
                <span v-if="getCharacterRole(c.id) !== 'none'" class="char-chip-role">{{ roleLabel(getCharacterRole(c.id)) }}</span>
                <button class="char-chip-remove" @click="toggleCharacterSelected(c.id)" title="Remove">✕</button>
              </div>
              <button @click="openCharactersModal" class="btn-secondary btn-small">👥 Choose Characters</button>
            </div>
            <p v-if="selectedCharCount === 0" class="form-hint">No characters selected — tap above to add. Leave empty and the storyteller will invent them.</p>
          </div>

          <div class="form-field">
            <label>Genre <span class="help-text">— the type of story</span></label>
            <select v-model="formData.genre" class="select-input">
              <option v-for="g in genres" :key="g.value" :value="g.value">{{ g.emoji }} {{ g.label }}</option>
            </select>
          </div>

          <div class="form-field">
            <label>Story Details <span class="help-text">— make it your own with cool details</span></label>
            <textarea v-model="formData.storyDetails" placeholder="Anything that makes this story special — setting, plot, surprises, who's in it... e.g. 'A rainy day in Hawaii, the kids find a magic conch, mention pancakes for breakfast'" class="textarea-input textarea-large textarea-resize" rows="6"></textarea>
          </div>

          <div class="form-field">
            <label>Story Ingredients <span class="help-text">— how it should feel</span> <span class="optional">(pick up to 3 — {{ ingredientCount }}/3 selected)</span></label>
            <div class="ingredients-grid">
              <button v-for="ing in ingredients" :key="ing.value" @click="toggleIngredient(ing.value)" :disabled="isIngredientDisabled(ing.value)" :class="['pill pill-compact', { active: isIngredientActive(ing.value), disabled: isIngredientDisabled(ing.value) }]">
                <span class="pill-emoji">{{ ing.emoji }}</span>
                <span class="pill-text">{{ ing.label }}</span>
              </button>
            </div>
          </div>

          <div class="form-field">
            <label>Theme <span class="help-text">— the moral or message</span> <span class="optional">(optional)</span></label>
            <input type="text" v-model="formData.theme" placeholder="e.g. 'the moral of the story is to keep trying', family, sharing, being brave..." class="text-input" />
          </div>

          <div class="form-field">
            <label>Picture Artwork Style <span class="help-text">— how the pictures will look</span></label>
            <select v-model="formData.artStyle" class="select-input">
              <option v-for="s in artStyles" :key="s.value" :value="s.value">{{ s.emoji }} {{ s.label }}</option>
            </select>
          </div>

          <div class="form-field">
            <label>Story for Age</label>
            <div class="pill-group age-stages-grid">
              <button v-for="stage in ageStages" :key="stage.value" @click="formData.ageRange = stage.value" :class="['pill pill-age-big', { active: formData.ageRange === stage.value }]">
                <div class="pill-emoji-big">{{ stage.emoji }}</div>
                <div class="pill-label">{{ stage.label }}</div>
                <div class="pill-subtitle">{{ stage.range }}</div>
              </button>
            </div>
          </div>

          <div class="form-field">
            <label>Story Length</label>
            <div class="pill-group length-3">
              <button v-for="option in lengths" :key="option.value" @click="formData.length = option.value" :class="['pill', { active: formData.length === option.value }]">
                <div class="pill-label">{{ option.label }}</div>
                <div class="pill-subtitle">{{ option.subtitle }}</div>
              </button>
            </div>
          </div>

          <div class="form-field">
            <label>Created By</label>
            <div class="created-by-wrapper">
              <input
                type="text"
                v-model="formData.createdBy"
                @focus="onCreatedByFocus"
                @blur="onCreatedByBlur"
                placeholder="e.g. Kai, Kai & Papa, Nozomi"
                class="text-input"
              />
              <div v-if="showCreatedBySuggestions && filteredCreatedBySuggestions.length" class="suggestions-list suggestions-list-up">
                <div v-for="s in filteredCreatedBySuggestions" :key="s" class="suggestion-item">
                  <button @mousedown.prevent="selectCreatedBy(s)" class="suggestion-pick">{{ s }}</button>
                  <button @mousedown.prevent="removeCreatedBy(s)" class="suggestion-x" title="Remove">✕</button>
                </div>
              </div>
            </div>
          </div>

          <button @click="handleGenerate" class="btn-primary btn-large">Generate Story</button>

          <p v-if="error" class="error-text">{{ error }}</p>

        </div>

        <!-- ============== LIBRARY (home) ============== -->
        <div v-else-if="view === 'library'" class="library-view" :class="{ 'manage-active': manageMode }"
             @touchstart.passive="handlePullStart" @touchmove.passive="handlePullMove" @touchend="handlePullEnd">

          <!-- Pull-to-refresh indicator -->
          <div class="pull-refresh" :style="{ height: pullDistance + 'px' }">
            <div v-if="pullRefreshing" class="loading-spinner small"></div>
            <span v-else-if="pullDistance > 4" class="pull-refresh-text">{{ pullDistance > 55 ? '↑ release to refresh' : '↓ pull to refresh' }}</span>
          </div>

          <!-- Normal home bar -->
          <div v-if="!manageMode" class="library-bar">
            <div class="search-wrap">
              <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="20" y1="20" x2="16.65" y2="16.65"/></svg>
              <input type="text" v-model="librarySearch" placeholder="Search your library…" class="text-input library-search" />
              <button v-if="librarySearch" @click="librarySearch = ''" class="search-clear" aria-label="Clear search">✕</button>
            </div>
            <button @click="showFilters = !showFilters" :class="['bar-icon-btn', { 'filter-active': showFilters || anyFilterActive }]" title="Filter &amp; sort" aria-label="Filter and sort">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 5h18l-7 8v6l-4 2v-8z"/></svg>
            </button>
            <button @click="openSettings" class="bar-icon-btn" title="Settings" aria-label="Settings">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            </button>
          </div>

          <!-- Manage (delete) bar -->
          <div v-else class="library-bar manage-bar-top">
            <span class="manage-bar-label">🗑 Tap books to delete · {{ booksToDelete.length }} selected</span>
            <button @click="exitManageMode" class="btn-secondary btn-small">Cancel</button>
          </div>

          <!-- Filter / sort panel (multi-select chips; empty = all) -->
          <div v-if="showFilters && !manageMode" class="filter-panel">
            <div class="filter-row"><span>Sort by</span>
              <select v-model="sortBy" class="select-input">
                <option value="created">Newest created</option>
                <option value="last_read">Last read</option>
                <option value="rating">Top rated</option>
                <option value="title">Title A–Z</option>
              </select>
            </div>

            <!-- Genre -->
            <div class="facc-item">
              <button :class="['facc-bar', { open: openFilter === 'genre' }]" @click="toggleFilterOpen('genre')">
                <span class="facc-name">Genre</span>
                <span class="facc-summary">{{ filterSummaryText('filterGenres', filterGenreOptions) }}</span>
                <span class="facc-caret">▾</span>
              </button>
              <div v-if="openFilter === 'genre'" class="facc-list">
                <button v-for="g in filterGenreOptions" :key="g.value"
                  @click="toggleArrayFilter('filterGenres', g.value)"
                  :class="['facc-row', { on: isFilterOn('filterGenres', g.value) }]">
                  <span class="facc-row-label"><span class="facc-row-emoji">{{ g.emoji }}</span>{{ g.label }}</span>
                  <span class="facc-row-check">{{ isFilterOn('filterGenres', g.value) ? '✓' : '' }}</span>
                </button>
              </div>
            </div>

            <!-- Picture Artwork Style -->
            <div class="facc-item">
              <button :class="['facc-bar', { open: openFilter === 'art' }]" @click="toggleFilterOpen('art')">
                <span class="facc-name">Picture Artwork Style</span>
                <span class="facc-summary">{{ filterSummaryText('filterArts', filterArtOptions) }}</span>
                <span class="facc-caret">▾</span>
              </button>
              <div v-if="openFilter === 'art'" class="facc-list">
                <button v-for="s in filterArtOptions" :key="s.value"
                  @click="toggleArrayFilter('filterArts', s.value)"
                  :class="['facc-row', { on: isFilterOn('filterArts', s.value) }]">
                  <span class="facc-row-label"><span class="facc-row-emoji">{{ s.emoji }}</span>{{ s.label }}</span>
                  <span class="facc-row-check">{{ isFilterOn('filterArts', s.value) ? '✓' : '' }}</span>
                </button>
              </div>
            </div>

            <!-- Story for Age (natural age order) -->
            <div class="facc-item">
              <button :class="['facc-bar', { open: openFilter === 'age' }]" @click="toggleFilterOpen('age')">
                <span class="facc-name">Story for Age</span>
                <span class="facc-summary">{{ filterSummaryText('filterAges', ageStages) }}</span>
                <span class="facc-caret">▾</span>
              </button>
              <div v-if="openFilter === 'age'" class="facc-list">
                <button v-for="stage in ageStages" :key="stage.value"
                  @click="toggleArrayFilter('filterAges', stage.value)"
                  :class="['facc-row', { on: isFilterOn('filterAges', stage.value) }]">
                  <span class="facc-row-label"><span class="facc-row-emoji">{{ stage.emoji }}</span>{{ stage.label }} ({{ stage.range }})</span>
                  <span class="facc-row-check">{{ isFilterOn('filterAges', stage.value) ? '✓' : '' }}</span>
                </button>
              </div>
            </div>

            <!-- Created by -->
            <div v-if="distinctCreators.length" class="facc-item">
              <button :class="['facc-bar', { open: openFilter === 'creator' }]" @click="toggleFilterOpen('creator')">
                <span class="facc-name">Created by</span>
                <span class="facc-summary">{{ filterSummaryText('filterCreators', null) }}</span>
                <span class="facc-caret">▾</span>
              </button>
              <div v-if="openFilter === 'creator'" class="facc-list">
                <button v-for="c in orderedCreators" :key="c"
                  @click="toggleArrayFilter('filterCreators', c)"
                  :class="['facc-row', { on: isFilterOn('filterCreators', c) }]">
                  <span class="facc-row-label">{{ c }}</span>
                  <span class="facc-row-check">{{ isFilterOn('filterCreators', c) ? '✓' : '' }}</span>
                </button>
              </div>
            </div>

            <button v-if="anyFilterActive || sortBy !== 'created'" @click="clearFilters" class="btn-secondary filter-reset-btn">
              ↺ Reset{{ activeFilterCount ? ' (' + activeFilterCount + ' filter' + (activeFilterCount > 1 ? 's' : '') + ')' : '' }}
            </button>
          </div>

          <!-- Loading skeletons: placeholder books on the shelf -->
          <div v-if="libraryLoading && !libraryBooks.length" class="bookshelf">
            <div class="shelf-crown"></div>
            <div class="shelf-grid">
              <div v-for="n in 6" :key="'sk' + n" class="book-slot">
                <div class="book book-skeleton">
                  <div class="book-cover skeleton-shimmer"></div>
                  <div class="book-plate"></div>
                </div>
              </div>
            </div>
            <div class="shelf-base"></div>
          </div>


          <!-- The bookshelf: a wood crown caps it; each row is a shelf bay -->
          <div v-if="!(libraryLoading && !libraryBooks.length)" class="bookshelf">
            <div class="shelf-crown"></div>
            <div class="shelf-grid">

              <!-- Create-new "book" (first; hidden while searching/filtering/managing) -->
              <div v-if="!manageMode && !librarySearch.trim() && !anyFilterActive" class="book-slot create-slot">
                <button class="book create-book" @click="goCreate" aria-label="Create a new story">
                  <div class="book-cover create-cover">
                    <span class="create-sparkle create-sparkle-1">✦</span>
                    <span class="create-sparkle create-sparkle-2">✦</span>
                    <span class="create-sparkle create-sparkle-3">✦</span>
                    <span class="create-plus">+</span>
                  </div>
                  <div class="book-plate create-plate"><span class="book-plate-text">New Story</span></div>
                </button>
              </div>

              <!-- Books -->
              <div v-for="book in displayedBooks" :key="book.id" class="book-slot" :data-book-id="book.id">
                <button class="book"
                        :class="{ 'book-selected': manageMode && isBookSelectedForDelete(book.id), 'book-offline': isOffline && !isBookCachedLocal(book.id) }"
                        :disabled="isOffline && !isBookCachedLocal(book.id)"
                        @click="manageMode ? toggleBookForDelete(book.id) : openBookDetail(book, $event)">
                  <div class="book-cover">
                    <img v-if="libraryCover(book)" :src="libraryCover(book)" :alt="book.title" loading="lazy" draggable="false" />
                    <div v-else class="book-cover-fallback">📖</div>
                    <span v-if="manageMode" :class="['book-select-check', { on: isBookSelectedForDelete(book.id) }]">{{ isBookSelectedForDelete(book.id) ? '✓' : '' }}</span>
                    <span v-else-if="isBookNew(book)" class="book-new-badge">NEW</span>
                    <span v-if="isOffline && !isBookCachedLocal(book.id)" class="book-offline-badge">☁︎</span>
                  </div>
                  <div class="book-plate"><span class="book-plate-text">{{ book.title || 'Untitled' }}</span></div>
                </button>
              </div>

            </div>

            <div class="shelf-base"></div>

            <!-- Empty states -->
            <div v-if="!displayedBooks.length && (librarySearch.trim() || anyFilterActive)" class="library-empty">
              <div class="empty-text">No books match your search or filters.</div>
            </div>
            <div v-else-if="!libraryBooks.length" class="library-empty">
              <div class="empty-emoji">📚</div>
              <div class="empty-title">No books yet</div>
              <div class="empty-text">Tap the glowing <strong>New Story</strong> book to create your first one.</div>
            </div>
          </div>

          <!-- Manage action bar (fixed at the bottom) -->
          <div v-if="manageMode" class="manage-action-bar">
            <button @click="exitManageMode" class="btn-secondary">Cancel</button>
            <button @click="confirmDeleteSelected" :disabled="!booksToDelete.length || managingDelete" class="btn-primary btn-danger">
              {{ managingDelete ? 'Deleting…' : 'Delete (' + booksToDelete.length + ')' }}
            </button>
          </div>
        </div>

        <!-- ============== READING VIEW ============== -->
        <div v-else-if="view === 'story' && currentStory" class="reading-view" :class="{ 'portrait-mode': isPortrait }">

          <!-- Floating controls: back (top-left) + page count (top-right). They
               only appear when you tap the screen, and hide while turning pages. -->
          <button @click="closeBook" :class="['reader-back', { 'reader-ui-hide': !readerUiShow }]" aria-label="Back to library">‹</button>
          <div v-if="currentStoryPage" :class="['reader-pagenum', { 'reader-ui-hide': !readerUiShow }]">{{ pageShortLabel }}</div>

          <!-- Persistent book binding down the centre (so it never pops in after a turn) -->
          <div v-if="currentStoryPage || pageTurning" class="book-crease" :class="{ portrait: isPortrait }" aria-hidden="true"></div>

          <!-- DEV: cover-edge diagnostic toggle + panel (gated on Diagnostics mode in Settings) -->
          <button v-if="diagMode" class="cover-diag-toggle" @click="showCoverDiag = !showCoverDiag" aria-label="Cover edge diagnostics">🧪</button>
          <div v-if="diagMode && showCoverDiag" class="cover-diag-panel">
            <div class="cdg-title">Page cast shadow</div>
            <label class="cdg-chk"><input type="checkbox" v-model="coverDiag.pageShadow"> Enabled</label>
            <label class="cdg-chk"><input type="checkbox" v-model="coverDiag.shadowDebug"> 🎨 Debug colours (blue=revealed, red=covered)</label>
            <div class="cdg-slider">Intensity {{ Math.round(coverDiag.shadowStrength * 100) }}%
              <input type="range" min="0" max="1" step="0.05" v-model.number="coverDiag.shadowStrength"></div>
            <div class="cdg-row">
              <span style="opacity:.7;margin-right:4px;">Ramp</span>
              <button :class="['cdg-pill',{on:coverDiag.shadowCurve==='linear'}]" @click="coverDiag.shadowCurve='linear'">linear</button>
              <button :class="['cdg-pill',{on:coverDiag.shadowCurve==='x2'}]" @click="coverDiag.shadowCurve='x2'">x²</button>
              <button :class="['cdg-pill',{on:coverDiag.shadowCurve==='x2.5'}]" @click="coverDiag.shadowCurve='x2.5'">x²·⁵</button>
              <button :class="['cdg-pill',{on:coverDiag.shadowCurve==='x3'}]" @click="coverDiag.shadowCurve='x3'">x³</button>
            </div>
            <div class="cdg-slider">Projection {{ Math.round(coverDiag.shadowProj * 100) }}%
              <input type="range" min="0" max="1" step="0.05" v-model.number="coverDiag.shadowProj"></div>
            <div class="cdg-slider">Revealed-page {{ Math.round(coverDiag.revealedShadow * 100) }}%
              <input type="range" min="0" max="1" step="0.05" v-model.number="coverDiag.revealedShadow"></div>
            <div class="cdg-slider">Softness {{ Math.round(coverDiag.shadowBlur * 100) }}%
              <input type="range" min="0" max="1" step="0.05" v-model.number="coverDiag.shadowBlur"></div>
          </div>

          <div class="page-area"
               @touchstart.passive="curlStart" @touchmove="curlMove" @touchend="curlEnd" @touchcancel="curlEnd"
               @mousedown="curlStart">

            <!-- ===== COVER (a closed book, like a shelf book, that opens on turn) ===== -->
            <div v-if="isOnCover" class="book-page cover-page" :class="{ portrait: isPortrait, 'cover-shift': coverShift }">
              <div class="cover-book" :class="{ portrait: isPortrait }">
                <div class="cover-front">
                  <div class="cover-art">
                    <div v-if="currentStory.cover.image_status === 'ready' && getImageURL(currentStory.cover.image_id)" class="image-blur" :style="{ backgroundImage: 'url(' + getImageURL(currentStory.cover.image_id) + ')' }"></div>
                    <div class="image-frame">
                      <template v-if="currentStory.cover.image_status === 'ready' && getImageURL(currentStory.cover.image_id)">
                        <img :src="getImageURL(currentStory.cover.image_id)" :alt="currentStory.cover.image_prompt" class="page-image" draggable="false" />
                      </template>
                      <template v-else-if="currentStory.cover.image_status === 'loading' || currentStory.cover.image_status === 'pending'">
                        <div class="image-placeholder">
                          <div class="loading-spinner small"></div>
                          <div class="placeholder-label">Drawing the cover…</div>
                        </div>
                      </template>
                      <template v-else-if="currentStory.cover.image_status === 'skipped'">
                        <div class="image-placeholder skipped">
                          <div class="placeholder-label">[Skipped]</div>
                          <pre class="placeholder-prompt">{{ currentStory.cover.image_prompt }}</pre>
                        </div>
                      </template>
                      <template v-else-if="currentStory.cover.image_status === 'failed'">
                        <div class="image-placeholder failed">
                          <div class="placeholder-label">Image failed</div>
                          <button @click.stop="regenerateOneImage('cover')" class="btn-secondary btn-tiny">Try Again</button>
                        </div>
                      </template>
                      <button v-if="showInspect && currentStory.cover.image_status === 'ready'" class="inspect-btn" @click="openImageInspection('cover')" aria-label="Inspect image">ⓘ</button>
                    </div>
                  </div>
                  <div class="cover-plate"><span class="cover-plate-text">{{ currentStory.title }}</span></div>
                  <div v-if="currentStory.created_by" class="cover-byline">By {{ currentStory.created_by }}</div>
                </div>
              </div>
            </div>

            <!-- ===== STORY SPREAD ===== -->
            <div v-else-if="currentStoryPage" class="book-page story-spread" :class="{ portrait: isPortrait, 'last-spread': isOnLastTextPage }">
              <div class="spread-image">
                <div v-if="currentStoryPage.image_status === 'ready' && getImageURL(currentStoryPage.image_id)" class="image-blur" :style="{ backgroundImage: 'url(' + getImageURL(currentStoryPage.image_id) + ')' }"></div>
                <div class="image-frame">
                  <template v-if="currentStoryPage.image_status === 'ready' && getImageURL(currentStoryPage.image_id)">
                    <img :src="getImageURL(currentStoryPage.image_id)" :alt="currentStoryPage.image_prompt" class="page-image" draggable="false" />
                  </template>
                  <template v-else-if="currentStoryPage.image_status === 'loading' || currentStoryPage.image_status === 'pending'">
                    <div class="image-placeholder">
                      <div class="loading-spinner small"></div>
                      <div class="placeholder-label">Drawing this page…</div>
                    </div>
                  </template>
                  <template v-else-if="currentStoryPage.image_status === 'skipped'">
                    <div class="image-placeholder skipped">
                      <div class="placeholder-label">[Image skipped]</div>
                      <pre class="placeholder-prompt">{{ currentStoryPage.image_prompt }}</pre>
                    </div>
                  </template>
                  <template v-else-if="currentStoryPage.image_status === 'failed'">
                    <div class="image-placeholder failed">
                      <div class="placeholder-label">Image failed</div>
                      <button @click.stop="regenerateOneImage(currentPageIndex - 1)" class="btn-secondary btn-tiny">Try Again</button>
                    </div>
                  </template>
                  <button v-if="showInspect && currentStoryPage.image_status === 'ready'" class="inspect-btn" @click="openImageInspection(currentPageIndex - 1)" aria-label="Inspect image">ⓘ</button>
                </div>
              </div>
              <div class="spread-text">
                <p>{{ currentStoryPage.text }}</p>
                <div v-if="isOnLastTextPage" class="the-end">
                  <span class="the-end-text">The End</span>
                </div>
              </div>
            </div>

            <!-- ===== STORY TOOLBOX ===== -->
            <div v-else-if="isOnStoryToolbox" class="book-page toolbox-page">
              <div class="toolbox-header">
                <div v-if="currentStory.cover.image_id && getImageURL(currentStory.cover.image_id)" class="toolbox-thumb">
                  <img :src="getImageURL(currentStory.cover.image_id)" alt="Cover" />
                </div>
                <h2 class="toolbox-title">{{ currentStory.title }}</h2>
              </div>
              <div v-if="currentStory.summary" class="toolbox-summary">"{{ currentStory.summary }}"</div>
              <div class="toolbox-meta">{{ formattedCreatedAt }}</div>

              <div v-if="currentStory.created_by" class="toolbox-by">
                <span>By {{ currentStory.created_by }}</span>
              </div>

              <div class="toolbox-section">
                <div class="rating-label">Rate this story</div>
                <div class="rating-stars">
                  <button v-for="n in 5" :key="n" @click="setRating(n)" :class="['rating-star', { filled: currentStory.rating >= n }]">★</button>
                </div>
              </div>

              <div class="toolbox-actions">
                <button @click="readAgain" class="btn-secondary">Read Again</button>
                <button v-if="currentStory.quiz" @click="openQuiz" class="btn-secondary">🧠 Quiz Me</button>
                <button @click="handleContinueStory" class="btn-secondary" disabled title="Coming soon — sequels with the same characters">Continue Story</button>
                <button @click="handleNewStory" class="btn-primary">New Story</button>
              </div>
            </div>

            <!-- Navigation: swipe on touch, arrow keys on desktop (on-screen arrows removed) -->

          </div>
        </div>

      </main>

      <!-- ============== COPYRIGHT FALLBACK MODAL ============== -->
      <div v-if="copyrightModal" class="modal-overlay">
        <div class="modal">
          <div class="modal-header">
            <h2>⚠️ Couldn't draw this image</h2>
          </div>
          <p class="modal-text">
            The image AI couldn't draw a scene with
            <strong>{{ copyrightModal.problematicChars.map(c => c.name).join(', ') }}</strong>
            — likely due to copyright restrictions.
          </p>
          <p class="modal-text">
            We can try again using generic alternate names and descriptions. The story text will still use the real names.
          </p>
          <div class="modal-footer">
            <button @click="cancelCopyrightFallback" class="btn-secondary">Skip This Image</button>
            <button @click="confirmCopyrightFallback" class="btn-primary">Try with Generic</button>
          </div>
        </div>
      </div>

      <!-- ============== CHARACTER WARNING MODAL ============== -->
      <div v-if="warningModal" class="modal-overlay" @click.self="closeWarningModal">
        <div class="modal">
          <div class="modal-header">
            <h2>About this flag</h2>
            <button @click="closeWarningModal" class="modal-close">✕</button>
          </div>
          <p class="modal-text">
            "<strong>{{ warningModal.char.name }}</strong>" matches a known copyrighted character keyword
            <span v-if="warningModal.matches.length > 0">(<em>{{ warningModal.matches.join(', ') }}</em>)</span>
            that often gets blocked by the image generator.
          </p>
          <p class="modal-text">
            If image generation works fine for this character, this flag will disappear automatically.
            You can also mark them safe now to hide it.
          </p>
          <div class="modal-footer">
            <button @click="closeWarningModal" class="btn-secondary">Keep Flag</button>
            <button @click="markCharacterSafe" class="btn-primary">Mark Safe</button>
          </div>
        </div>
      </div>

      <!-- ============== IMAGE INSPECTION MODAL ============== -->
      <div v-if="inspectingImage" class="modal-overlay" @click.self="closeImageInspection">
        <div class="modal modal-inspect">
          <div class="modal-header">
            <h2>Image Details</h2>
            <button @click="closeImageInspection" class="modal-close">✕</button>
          </div>

          <div v-if="inspectingImage.image_id && getImageURL(inspectingImage.image_id)" class="inspect-thumb">
            <img :src="getImageURL(inspectingImage.image_id)" alt="Preview" />
          </div>

          <div class="inspect-stats">
            <div><strong>Status:</strong> {{ inspectingImage.status }}</div>
            <div><strong>Cost:</strong> ${{ (inspectingImage.cost || 0).toFixed(4) }}</div>
          </div>

          <details class="inspect-section">
            <summary>Basic image_prompt (from GPT-4o)</summary>
            <pre class="debug-code">{{ inspectingImage.image_prompt || '(none)' }}</pre>
          </details>

          <details class="inspect-section" v-if="inspectingImage.enriched_prompt">
            <summary>Enriched prompt (gpt-4o-mini)</summary>
            <pre class="debug-code">{{ inspectingImage.enriched_prompt }}</pre>
          </details>

          <details class="inspect-section" open>
            <summary>Full prompt sent to gpt-image-1</summary>
            <pre class="debug-code">{{ inspectingImage.full_prompt }}</pre>
          </details>

          <div class="modal-footer">
            <button @click="closeImageInspection" class="btn-secondary">Close</button>
            <button @click="regenerateOneImage(inspectingImage.target)" class="btn-primary">🔁 Regenerate</button>
          </div>
        </div>
      </div>

      <!-- ============== QUIZ MODAL ============== -->
      <div v-if="showQuiz && currentStory && currentStory.quiz" class="modal-overlay" @click.self="closeQuiz">
        <div class="modal modal-wide quiz-modal">
          <div class="modal-header">
            <h2>🧠 Quiz Time!</h2>
            <button @click="closeQuiz" class="modal-close modal-close-big">✕</button>
          </div>

          <div class="quiz-section">
            <div class="quiz-section-title">What do you remember?</div>
            <div v-for="(q, qIdx) in currentStory.quiz.comprehension" :key="'c'+qIdx" class="quiz-question">
              <div class="quiz-q-text">{{ qIdx + 1 }}. {{ q.question }}</div>
              <div class="quiz-options">
                <button
                  v-for="(opt, optIdx) in q.options"
                  :key="optIdx"
                  @click="setQuizAnswer(qIdx, optIdx)"
                  :class="[
                    'quiz-option',
                    { selected: quizAnswers[qIdx] === optIdx },
                    { correct: quizRevealed && q.correct === optIdx },
                    { incorrect: quizRevealed && quizAnswers[qIdx] === optIdx && q.correct !== optIdx }
                  ]"
                  :disabled="quizRevealed"
                >{{ opt }}</button>
              </div>
            </div>
            <button
              v-if="!quizRevealed && quizAllAnswered()"
              @click="revealQuizAnswers"
              class="btn-primary"
            >Reveal Answers</button>
            <div v-if="quizRevealed" class="quiz-score">
              <div class="quiz-result-msg">{{ quizResultMessage() }}</div>
              <div>You got <strong>{{ quizScore().correct }} / {{ quizScore().total }}</strong> right!</div>
              <button v-if="quizScore().correct < quizScore().total" @click="tryQuizAgain" class="btn-secondary quiz-retry">🔄 Try Again</button>
            </div>
          </div>

          <div v-if="currentStory.quiz.reflection && currentStory.quiz.reflection.length" class="quiz-section">
            <div class="quiz-section-title">Think about it</div>
            <div v-for="(r, rIdx) in currentStory.quiz.reflection" :key="'r'+rIdx" class="quiz-reflection">
              {{ rIdx + 1 }}. {{ r }}
            </div>
          </div>

          <div class="modal-footer">
            <button @click="closeQuiz" class="btn-primary">Done</button>
          </div>
        </div>
      </div>

      <!-- ============== CHARACTERS MODAL ============== -->
      <div v-if="showCharactersModal" class="modal-overlay" @click.self="handleCharOverlayClick">
        <div class="modal modal-wide">

          <template v-if="charModalMode === 'list'">
            <div class="modal-header">
              <h2>Manage Characters</h2>
              <button @click="handleModalX" class="modal-close modal-close-big" aria-label="Close">✕</button>
            </div>
            <p class="modal-hint">Tap a character to add to your story · {{ selectedCharCount }}/5 selected</p>
            <div class="modal-actions">
              <button @click="startCreateCharacter" class="btn-primary btn-small">+ Create New</button>
              <button @click="handleGenerateRandom" :disabled="generatingRandom" class="btn-secondary btn-small">🎲 {{ generatingRandom ? 'Generating…' : 'Generate Random' }}</button>
            </div>
            <div v-if="characters.length > 3" class="search-wrap char-search-wrap">
              <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="20" y1="20" x2="16.65" y2="16.65"/></svg>
              <input type="text" v-model="charSearch" placeholder="Search characters…" class="text-input char-search library-search" />
              <button v-if="charSearch" @click="charSearch = ''" class="search-clear" aria-label="Clear search">✕</button>
            </div>
            <div v-if="error" class="error-text" style="margin: 0.5rem 0;">{{ error }}</div>
            <div class="char-list">
              <div v-if="characters.length === 0" class="char-list-empty">
                <div class="empty-emoji">👤</div>
                <div class="empty-title">No characters yet</div>
                <div class="empty-text">Tap <strong>+ Create New</strong> to make one, or <strong>🎲 Generate Random</strong> to let the AI invent one.</div>
              </div>
              <div v-for="c in filteredCharacters" :key="c.id" :class="['char-row', { selected: isCharacterSelected(c.id), 'at-limit': !canAddCharacter(c.id) }]">
                <div class="char-row-top">
                  <div class="char-row-thumb">
                    <img v-if="c.thumbnail_id && getImageURL(c.thumbnail_id)" :src="getImageURL(c.thumbnail_id)" :alt="c.name" />
                    <img v-else src="assets/images/character-default.png" :alt="c.name" />
                  </div>
                  <div class="char-row-info">
                    <div class="char-row-name-line">
                      <span class="char-row-name">{{ c.name }}</span>
                      <span v-if="isCharacterNew(c)" class="char-new-badge">NEW</span>
                      <button
                        v-if="charStateBadge(c)"
                        @click.stop="showCharBadgeExplanation(c)"
                        :class="['char-state-btn', 'char-state-' + charStateBadge(c).kind]"
                        :title="charStateBadge(c).title"
                      >{{ charStateBadge(c).symbol }}</button>
                    </div>
                    <div v-if="c.tagline" class="char-row-tagline">{{ c.tagline }}</div>
                    <div class="char-row-meta">{{ formatRelative(c.last_used_at) }}</div>
                  </div>
                  <button @click="toggleCharacterSelected(c.id)" :disabled="!canAddCharacter(c.id)" :class="['add-btn', { added: isCharacterSelected(c.id) }]">
                    {{ isCharacterSelected(c.id) ? '✓ Added' : (canAddCharacter(c.id) ? '+ Add to Story' : 'Max') }}
                  </button>
                </div>
                <div v-if="isCharacterSelected(c.id)" class="char-role-pills">
                  <button :class="['pill pill-small', { active: getCharacterRole(c.id) === 'good-guy' }]" @click="setCharacterRole(c.id, getCharacterRole(c.id) === 'good-guy' ? 'none' : 'good-guy')">Good Guy</button>
                  <button :class="['pill pill-small', { active: getCharacterRole(c.id) === 'bad-guy' }]" @click="setCharacterRole(c.id, getCharacterRole(c.id) === 'bad-guy' ? 'none' : 'bad-guy')">Bad Guy</button>
                </div>
                <div class="char-row-bottom">
                  <button class="char-expand-toggle" @click="toggleCharProfileExpanded(c.id)">{{ isCharProfileExpanded(c.id) ? '▾' : '▸' }} Expanded Character Profile</button>
                  <div class="char-row-edit-actions">
                    <button @click="startEditCharacter(c)" class="text-link">Edit</button>
                    <span class="text-link-sep">·</span>
                    <button @click="handleDeleteCharacter(c)" class="text-link text-link-danger">Delete</button>
                  </div>
                </div>
                <div v-if="isCharProfileExpanded(c.id)" class="char-profile-preview">
                  <p>{{ c.visual_description || '(no description yet)' }}</p>
                </div>
              </div>
            </div>

            <div class="modal-footer">
              <button @click="closeCharactersModal" class="btn-primary">Done</button>
            </div>
          </template>

          <template v-else>
            <div class="modal-header">
              <h2>{{ charModalMode === 'create' ? 'Create Character' : 'Edit Character' }}</h2>
            </div>
            <p v-if="isRandomNew" class="modal-hint modal-hint-emphasize">✨ This character is newly invented. Tap <strong>Save &amp; Close</strong> below to keep them.</p>
            <div class="char-form">
              <div class="form-field">
                <label>Name</label>
                <input type="text" v-model="charForm.name" placeholder="e.g. Kai, Bumble, Lord Frostbeard" class="text-input" />
              </div>
              <div class="form-field">
                <label>Description <span class="help-text">— the key details to keep consistent</span></label>
                <textarea v-model="charForm.user_description" placeholder="Describe them in your own words — appearance, personality, anything you want consistent." class="textarea-input textarea-char-desc" rows="6"></textarea>
              </div>

              <!-- Photo capture -->
              <div class="form-field">
                <label>Reference Photo <span class="optional">(optional)</span></label>
                <input ref="addPhotoInput" type="file" accept="image/*" @change="handlePhotoSelect" style="display: none;" />
                <div v-if="!charForm.photo_id" class="photo-add-area" @click="!analyzingPhoto && triggerAddPhoto()" :class="{ disabled: analyzingPhoto }">
                  <div class="photo-add-icon">📷</div>
                  <div class="photo-add-label">Add a Photo</div>
                  <div class="photo-add-sub">Person, drawing, or toy · AI analyzes it (~2¢)</div>
                </div>
                <div v-else-if="getImageURL(charForm.photo_id)" class="photo-preview-square">
                  <img :src="getImageURL(charForm.photo_id)" alt="Reference" />
                  <button @click="handleRemovePhoto" :disabled="analyzingPhoto" class="photo-delete-x" aria-label="Remove photo">✕</button>
                </div>
                <div v-if="analyzingPhoto" class="form-hint" style="margin-top: 0.5rem; color: var(--accent);">Analyzing photo…</div>
                <button v-if="charForm.photo_id && !analyzingPhoto" @click="handleReanalyzePhoto" class="btn-secondary btn-small" style="margin-top: 0.5rem;">🔄 Re-analyze photo</button>
                <details v-if="charForm.photo_description" class="photo-description-toggle" style="margin-top: 0.6rem;">
                  <summary>▸ Photo description (auto-generated)</summary>
                  <textarea v-model="charForm.photo_description" rows="4" class="textarea-input" style="margin-top: 0.4rem;"></textarea>
                </details>
              </div>

              <button @click="handleEnhance" :disabled="!charFormCanEnhance" class="btn-primary">✨ {{ enhancing ? 'Bringing to life…' : 'Bring to Life' }}</button>
              <div v-if="charForm.visual_description" class="form-field" style="margin-top: 1.2rem;">
                <label>Tagline <span class="help-text">— short identifier shown in the list</span></label>
                <input type="text" v-model="charForm.tagline" placeholder="e.g. 8-year-old curious boy" class="text-input" />
              </div>
              <div v-if="charForm.visual_description" class="form-field">
                <label>Character Profile <span class="help-text">— how the storyteller and illustrator will see them</span></label>
                <textarea v-model="charForm.visual_description" class="textarea-input" rows="6"></textarea>
              </div>

              <!-- Thumbnail section -->
              <div v-if="charForm.visual_description" class="form-field">
                <label>Avatar Thumbnail <span class="help-text">— shown in character list</span></label>
                <div class="thumbnail-row">
                  <div v-if="charForm.thumbnail_id && getImageURL(charForm.thumbnail_id)" class="thumbnail-preview">
                    <img :src="getImageURL(charForm.thumbnail_id)" alt="Thumbnail" />
                  </div>
                  <div v-else class="thumbnail-preview thumbnail-placeholder">
                    <img src="assets/images/character-default.png" alt="No thumbnail" />
                  </div>
                  <button @click="handleGenerateThumbnail" :disabled="isThumbGenerating()" class="btn-secondary btn-small">
                    {{ isThumbGenerating() ? 'Generating…' : (charForm.thumbnail_id ? '🔁 Regenerate' : '✨ Generate Thumbnail') }}
                  </button>
                </div>
                <p class="form-hint">A cartoon portrait on a transparent background.</p>
              </div>

              <!-- Generic backup fields: hidden by default, expandable -->
              <div v-if="charForm.visual_description" class="form-field">
                <button class="text-link" @click="toggleShowCharFallback" type="button">
                  {{ showCharFallbackFields ? '▾' : '▸' }} Generic Backup (used if image AI rejects original)
                </button>
              </div>
              <template v-if="showCharFallbackFields && charForm.visual_description">
                <div class="form-field">
                  <label>Generic Name <span class="help-text">— used for image gen if name is blocked</span></label>
                  <input type="text" v-model="charForm.safe_fallback_name" class="text-input" />
                </div>
                <div class="form-field">
                  <label>Generic Description <span class="help-text">— used for image gen if description is blocked</span></label>
                  <textarea v-model="charForm.safe_fallback_visual_description" class="textarea-input" rows="4"></textarea>
                </div>
                <label class="toggle-line">
                  <input type="checkbox" :checked="charForm.always_use_fallback" @change="toggleAlwaysUseFallback" />
                  <span>Always use generic for images</span>
                </label>
              </template>

              <div v-if="error" class="error-text">{{ error }}</div>
              <p v-if="isThumbGenerating()" class="form-hint" style="text-align:center; margin: 0.2rem 0 0;">Avatar is still drawing — you can close; it'll finish in the background.</p>
              <div class="modal-footer">
                <button v-if="charForm.visual_description" @click="handleEnhance" :disabled="enhancing" class="btn-secondary">🔁 Try Again</button>
                <button @click="handleCloseCharForm" class="btn-primary">{{ charFormCanSave ? '✓ Save &amp; Close' : 'Close' }}</button>
              </div>
            </div>
          </template>

        </div>
      </div>

      <!-- ============== BOOK DETAIL — "inner cover" page ============== -->
      <div v-if="bookDetail" class="modal-overlay book-detail-overlay" ref="bookDetailOverlay" @click.self="closeBookDetail">
        <div class="inner-cover" ref="innerCover">
          <button @click="closeBookDetail" class="inner-cover-close" aria-label="Close">✕</button>

          <h2 class="inner-cover-title">{{ bookDetail.title || 'Untitled' }}</h2>
          <div v-if="bookDetail.created_by" class="inner-cover-by">by {{ bookDetail.created_by }}</div>

          <div class="inner-cover-rule"></div>

          <div class="inner-cover-body">
            <div class="inner-cover-thumb">
              <img v-if="libraryCover(bookDetail)" :src="libraryCover(bookDetail)" :alt="bookDetail.title" draggable="false" />
              <div v-else class="book-cover-fallback">📖</div>
            </div>
            <p v-if="bookDetail.summary" class="inner-cover-summary">{{ bookDetail.summary }}</p>
            <p v-else class="inner-cover-summary inner-cover-summary-muted">A StoryTime original.</p>
          </div>

          <div class="inner-cover-meta">
            <span v-if="bookDetailAgeLabel" class="inner-cover-tag">{{ bookDetailAgeLabel }}</span>
            <span v-if="bookDetailReadingTime" class="inner-cover-tag">⏱ ~{{ bookDetailReadingTime }} min</span>
            <span v-if="bookDetail.rating" class="inner-cover-stars">
              <span v-for="n in 5" :key="n" :class="['rating-star', { filled: bookDetail.rating >= n }]">★</span>
            </span>
          </div>

          <div class="inner-cover-dates">
            <span v-if="libraryDate(bookDetail)">Created {{ libraryDate(bookDetail) }}</span>
            <span v-if="bookDetail.last_read_at"> · Last read {{ libraryDate({ created_at: bookDetail.last_read_at }) }}</span>
          </div>

          <button @click="readFromDetail" class="btn-primary inner-cover-read">📖 Read this book</button>
        </div>
      </div>

      <!-- ============== CROPPER MODAL ============== -->
      <div v-if="showCropper" class="modal-overlay">
        <div class="modal modal-wide">
          <div class="modal-header">
            <h2>Crop Photo</h2>
            <button @click="cancelCrop" class="modal-close modal-close-big">✕</button>
          </div>
          <p class="modal-hint">Drag to crop to just the main subject — ignore background and extra stuff.</p>
          <div class="cropper-container">
            <img v-if="cropperSrc" ref="cropperImg" :src="cropperSrc" alt="Crop" />
          </div>
          <div class="modal-footer">
            <button @click="cancelCrop" class="btn-secondary">Cancel</button>
            <button @click="confirmCrop" class="btn-primary">Use This Crop</button>
          </div>
        </div>
      </div>

      <!-- ============== SETTINGS MENU ============== -->
      <div v-if="showSettings" class="modal-overlay" @click.self="closeSettings">
        <div class="modal modal-wide settings-modal">
          <div class="modal-header">
            <h2>⚙️ Settings</h2>
            <button @click="closeSettings" class="modal-close modal-close-big" aria-label="Close">✕</button>
          </div>

          <div class="settings-section">
            <div class="settings-section-title">🎨 Pictures</div>

            <div class="settings-sub">Pictures for the next story</div>
            <div class="settings-segment settings-segment-stacked">
              <button :class="{ active: imageGenMode === 'all' }" @click="setImageGenMode('all')">Draw all the pictures</button>
              <button :class="{ active: imageGenMode === 'first-two' }" @click="setImageGenMode('first-two')">Just the cover + first page</button>
              <button :class="{ active: imageGenMode === 'skip' }" @click="setImageGenMode('skip')">No pictures (text only)</button>

            <label class="toggle-line">
              <input type="checkbox" :checked="showInspect" @change="toggleShowInspect" />

            </label>
          </div>

          <div class="settings-section">
            <div class="settings-section-title">📊 Your Library (in the cloud)</div>
            <div class="settings-row"><span>Books</span><strong>{{ libraryBooks.length }}</strong></div>
            <div class="settings-row"><span>Characters</span><strong>{{ characters.length }}</strong></div>
            <div class="settings-row"><span>Images</span><strong>{{ cloudUsage.loaded ? cloudUsage.count : '…' }}</strong></div>
            <div class="settings-row"><span>Image storage</span><strong>{{ cloudUsage.loaded ? fmtBytes(cloudUsage.bytes) + ' / 1 GB' : 'checking…' }}</strong></div>
            <div v-if="cloudUsage.loaded" class="usage-bar"><div class="usage-fill" :style="{ width: cloudUsagePercent + '%' }"></div></div>
          </div>

          <div class="settings-section">
            <div class="settings-section-title">💾 Offline Cache</div>
            <div class="settings-row"><span>Images on this device</span><strong>{{ imageStats.count }} files, {{ formattedImageStorageSize }}</strong></div>
            <p class="settings-fine-print">Clearing is safe — your books live in the cloud and re-download when opened.</p>
            <div class="settings-row-actions">
              <button @click="handleClearImages" class="btn-secondary btn-small">Clear Offline Cache</button>
            </div>
          </div>

          <div class="settings-section">
            <div class="settings-section-title">📚 Library Tools</div>
            <div class="settings-row-actions">
              <button @click="handleUpdateSummaries" :disabled="summaryUpdating" class="btn-secondary btn-small">
                {{ summaryUpdating ? 'Updating…' : '✨ Update All Summaries' }}
              </button>
              <button @click="openManageBooks" class="btn-secondary btn-small">🗑 Manage / Delete Books</button>
            </div>
            <p v-if="summaryProgress" class="settings-fine-print" style="color: var(--accent);">{{ summaryProgress }}</p>
            <p class="settings-fine-print">Deleting books lives here (not on the book page) so it can't happen by accident.</p>
          </div>

          <div class="settings-section" v-if="spend">
            <div class="settings-section-title">💸 API Spend</div>

            <div class="spend-cards">
              <div class="spend-card">
                <div class="spend-card-label">Today</div>
                <div class="spend-card-value">{{ fmtUsd(spend.today) }}</div>
              </div>
              <div class="spend-card">
                <div class="spend-card-label">This week</div>
                <div class="spend-card-value">{{ fmtUsd(spend.week) }}</div>
              </div>
              <div class="spend-card">
                <div class="spend-card-label">All time</div>
                <div class="spend-card-value">{{ fmtUsd(spend.allTime) }}</div>
              </div>
            </div>

            <div class="spend-breakdown">
              <div class="spend-row">
                <div class="spend-row-head"><span>🎨 Illustrations</span><strong>{{ fmtUsd(spend.pictures) }}</strong></div>
                <div class="spend-bar"><span class="spend-bar-fill spend-bar-pics" :style="{ width: spendBarPct(spend.pictures) + '%' }"></span></div>
              </div>
              <div class="spend-row">
                <div class="spend-row-head"><span>📝 Story writing</span><strong>{{ fmtUsd(spend.text) }}</strong></div>
                <div class="spend-bar"><span class="spend-bar-fill spend-bar-text" :style="{ width: spendBarPct(spend.text) + '%' }"></span></div>
              </div>
              <div class="spend-row">
                <div class="spend-row-head"><span>🧑‍🎨 Character creation</span><strong>{{ fmtUsd(spend.characters) }}</strong></div>
                <div class="spend-bar"><span class="spend-bar-fill spend-bar-chars" :style="{ width: spendBarPct(spend.characters) + '%' }"></span></div>
              </div>
            </div>

            <div v-if="spend.lastStory" class="spend-last">
              Last story cost <strong>{{ fmtUsd(spend.lastStory.total) }}</strong>
              <span class="spend-last-split">({{ fmtUsd(spend.lastStory.text) }} writing · {{ fmtUsd(spend.lastStory.pictures) }} pictures)</span>
            </div>
          </div>

          <div class="settings-section">
            <div class="settings-section-title">🔐 Account</div>
            <div class="settings-row-actions">
              <button @click="resetPassword" class="btn-secondary btn-small">Reset Password</button>
            </div>
          </div>

          <div class="settings-section">
            <div class="settings-section-title">ℹ️ About</div>
            <div class="settings-row"><span>Version</span><strong>{{ version }}</strong></div>
            <div class="settings-row"><span>Built</span><strong>{{ buildDate }}</strong></div>
          </div>

          <details class="settings-section settings-collapsible">
            <summary>🛠️ Developer</summary>

            <label class="toggle-line">
              <input type="checkbox" :checked="diagMode" @change="toggleDiagMode" />
              <span>🧪 Diagnostics mode (in-app tuning tools)</span>
            </label>
            <p class="settings-fine-print">Surfaces build-time tuning panels — currently the cover-edge 🧪 panel in the reader.</p>

            <div class="settings-sub">Last generation</div>
            <div class="settings-row"><span>Text cost</span><strong>{{ formatCostFriendly(currentTextCost) }}</strong></div>
            <div class="settings-row"><span>Images cost</span><strong>{{ formatCostFriendly(currentImagesCost) }}</strong></div>
            <div class="settings-row"><span>Total</span><strong>{{ formatCostFriendly(currentStoryCost) }}</strong></div>
            <div v-if="lastTokens" class="settings-row"><span>Tokens</span><strong>{{ lastTokens.prompt_tokens }} in + {{ lastTokens.completion_tokens }} out</strong></div>

            <div class="settings-row-actions" style="margin-top: 0.8rem;">
              <button @click="handleFakeStory" class="btn-secondary btn-small">Generate Fake Story</button>
              <button @click="handleForceUpdate" class="btn-secondary btn-small">Refresh from Server</button>
              <button @click="handleMigrateToCloud" :disabled="migrating" class="btn-secondary btn-small">{{ migrating ? 'Backing up…' : '☁️ Back Up Existing Data' }}</button>
              <button @click="handleCleanupImages" class="btn-secondary btn-small">🧹 Clean Up Unused Images</button>
            </div>
            <p v-if="migrateProgress" class="settings-fine-print" style="color: var(--accent);">{{ migrateProgress }}</p>

            <details v-if="selectedCharacters.length > 0" class="settings-sub-collapse">
              <summary>Selected characters (for next story)</summary>
              <div v-for="c in selectedCharacters" :key="c.id" class="debug-character">
                <div><strong>{{ c.name }}</strong> — {{ roleLabel(getCharacterRole(c.id)) || 'no role' }}{{ c.tagline ? ' · ' + c.tagline : '' }}</div>
                <pre class="debug-code">{{ c.visual_description }}</pre>
              </div>
            </details>

            <details v-if="lastPrompt" class="settings-sub-collapse">
              <summary>Prompt sent to GPT-4o</summary>
              <button @click="copyToClipboard(lastPrompt)" class="btn-secondary btn-tiny">Copy</button>
              <pre class="debug-code">{{ lastPrompt }}</pre>
            </details>

            <details v-if="lastRawResponse" class="settings-sub-collapse">
              <summary>Raw text response</summary>
              <button @click="copyToClipboard(JSON.stringify(lastRawResponse, null, 2))" class="btn-secondary btn-tiny">Copy</button>
              <pre class="debug-code">{{ JSON.stringify(lastRawResponse, null, 2) }}</pre>
            </details>

            <details v-if="currentStory && currentStory.style_anchor" class="settings-sub-collapse">
              <summary>Style anchor</summary>
              <pre class="debug-code">{{ currentStory.style_anchor }}</pre>
            </details>
          </details>

        </div>
      </div>

    </template>
  </div>

  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/cropperjs@1.5.13/dist/cropper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="js/storage.js?v=0.9.52"></script>
  <script src="js/imageStorage.js?v=0.9.52"></script>
  <script src="js/api.js?v=0.9.52"></script>
  <script src="js/sync.js?v=0.9.52"></script>
  <script src="js/pageShadow.js?v=0.9.52"></script>
  <script src="js/pageCurl.js?v=0.9.52"></script>
  <script src="js/app.js?v=0.9.52"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then((reg) => {
            console.log('SW registered. Scope:', reg.scope);
            // Actively check for a new version on load and whenever the app is
            // brought back to the foreground (iOS PWAs otherwise update lazily).
            reg.update();
            document.addEventListener('visibilitychange', () => {
              if (document.visibilityState === 'visible') reg.update();
            });
            reg.addEventListener('updatefound', () => {
              const newWorker = reg.installing;
              if (!newWorker) return;
              newWorker.addEventListener('statechange', () => {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  newWorker.postMessage({ type: 'SKIP_WAITING' });
                }
              });
            });
          })
          .catch((err) => console.error('SW registration failed:', err));

        let reloadedForUpdate = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (reloadedForUpdate) return;
          reloadedForUpdate = true;
          window.location.reload();
        });
      });
    }
  </script>

</body>
</html>
